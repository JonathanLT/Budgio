name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy .env to workspace
        run: cp ~/budgio/.env .env

      - name: Build images
        run: docker compose build --no-cache --build-arg NEXT_PUBLIC_GIT_HASH=$(git rev-parse --short HEAD)

      - name: Start services
        run: docker compose up -d

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T api wget -qO- http://localhost:3001/api/docs > /dev/null 2>&1; then
              echo "API ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Show API logs if not healthy
        if: failure()
        run: docker compose logs api --tail=50

      - name: Run migrations
        run: docker compose exec -T api npx prisma migrate deploy

      - name: Cleanup old images
        run: docker image prune -f
