name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      # HIGH vulnérabilités résiduelles bloquées upstream (lodash via @nestjs/config,
      # multer via @nestjs/platform-express) — seuil à critical jusqu'au patch NestJS
      - name: Audit dependencies (critical severity)
        run: npm audit --audit-level=critical
